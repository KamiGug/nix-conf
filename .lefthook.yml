skip_lfs: true

pre-commit:
  commands:
    todos:
      run: |
        task -s todos
        git add todos.txt

pre-push:
  parallel: false
  commands:
    check:
      run: task check -- --all

commit-msg:
  commands:
    commitlint:
      run: |
        if grep -qE "^(Merge|Revert|Fixup) " {1}; then
          exit 0
        fi
        BRANCH=$(git rev-parse --abbrev-ref HEAD)
        if [[ "$BRANCH" == dev* ]]; then
          exit 0
        fi
        commitlint-rs --config commitlint.toml --edit {1}
